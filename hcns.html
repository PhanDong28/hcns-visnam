.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}

.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;max-width:320px}

.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
</style>

  {ma:'N/P', label:'N/P', ten:'KL0.5+P0.5',         mau:'#f87171',text:'#fff'},
  {ma:'TS',  label:'TS',  ten:'Nghỉ thai sản',      mau:'#ec4899',text:'#fff'},
  {ma:'NB',  label:'NB',  ten:'Nghỉ bảo hiểm',      mau:'#fb923c',text:'#7c2d12'},
  {ma:'NV',  label:'NV',  ten:'Nghỉ việc',          mau:'#6b7280',text:'#fff'},
  {ma:'ĐT',  label:'ĐT',  ten:'Đi trễ',             mau:'#f97316',text:'#fff'},
  {ma:'ĐP',  label:'ĐP',  ten:'Không đồng phục',    mau:'#c026d3',text:'#fff'},
  {ma:'VS',  label:'VS',  ten:'Về sớm',             mau:'#9333ea',text:'#fff'},
  {ma:'KVS', label:'KVS', ten:'Không vệ sinh',      mau:'#a21caf',text:'#fff'},
  {ma:'',    label:'✕',   ten:'Xóa ký hiệu',        mau:'#e5e7eb',text:'#6b7280'},
];

const DOW_VI=['CN','T2','T3','T4','T5','T6','T7'];
function khStyle(ma){const k=KY_HIEU.find(x=>x.ma===ma);if(!k||!ma)return 'background:#f3f4f6;color:#9ca3af';return `background:${k.mau};color:${k.text}`;}
function tinhCong(ma){return({X:1,'X/2':.5,CT:1,P:1,'P/2':.5,NL:1,KL:0,'N/P':.5,TS:0,NB:0,NV:0,ĐT:1,ĐP:1,VS:1,KVS:1})[ma]??0;}
function tinhPhep(ma){return ma==='P'?1:(ma==='P/2'||ma==='N/P')?.5:0;}
function isViPham(ma){return['ĐT','ĐP','VS','KVS'].includes(ma);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('vi-VN'):'—';}
function slugify(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');}

function hideLoading(){const el=document.getElementById('loading');if(el)el.style.display='none';}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}

onAuthStateChanged(auth,user=>{
  authResolved=true;S.user=user;
  if(user){initApp();}else{hideLoading();renderLogin();}
});

async function initApp(){
  try{await Promise.all([loadBoPhan(),loadNhanVien(),loadChamCong(),loadNgayLe()]);}
  catch(e){console.warn('Load error:',e);}
  hideLoading();render();
}

async function loadBoPhan(){
  try{const snap=await getDocs(query(collection(db,'bo_phan'),orderBy('thu_tu')));S.boPhan=snap.docs.map(d=>({id:d.id,...d.data()}));}
  catch{const snap=await getDocs(collection(db,'bo_phan'));S.boPhan=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.thu_tu||0)-(b.thu_tu||0));}
  if(!S.selectedBoPhan&&S.boPhan.length>0)S.selectedBoPhan=S.boPhan[0].id;
}
async function loadNhanVien(){const snap=await getDocs(collection(db,'nhan_vien'));S.nhanVien=snap.docs.map(d=>({id:d.id,...d.data()}));}
async function loadChamCong(){
  const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;
  try{const snap=await getDocs(collection(db,`cham_cong/${key}/records`));S.chamCong={};snap.docs.forEach(d=>{S.chamCong[d.id]=d.data();});}
  catch{S.chamCong={};}
}
async function loadNgayLe(){const snap=await getDocs(collection(db,'ngay_le'));S.ngayLe=snap.docs.map(d=>({id:d.id,...d.data()}));}

async function saveCC(nvId,ngay,ma,ghiChu=''){
  const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;
  const k=`${nvId}_${ngay}`;
  if(!ma){
    try{await deleteDoc(doc(db,`cham_cong/${key}/records`,k));}catch{}
    delete S.chamCong[k];
  }else{
    const data={nv_id:nvId,ngay,ky_hieu:ma,ghi_chu:ghiChu,cap_nhat:new Date().toISOString()};
    await setDoc(doc(db,`cham_cong/${key}/records`,k),data);
    S.chamCong[k]=data;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────

  const menu=[
    {sec:'Chấm công',items:[{id:'chamcong',icon:'📅',label:'Bảng chấm công'}]},
    {sec:'Quản lý',items:[{id:'nhanvien',icon:'👥',label:'Nhân viên'},{id:'bophan',icon:'🏢',label:'Bộ phận'},{id:'ngayle',icon:'🎌',label:'Ngày lễ'}]},
    {sec:'Thống kê',items:[{id:'baocao',icon:'📊',label:'Báo cáo'}]},

  ];

  const navHtml=menu.map(g=>`
    <div class="nav-section">${g.sec}</div>
    ${g.items.map(m=>`<button class="nav-item ${S.page===m.id?'active':''}" onclick="window._nav('${m.id}')">\
<span class="nav-icon">${m.icon}</span><span>${m.label}</span></button>`).join('')}
  `).join('');
  document.getElementById('app').innerHTML=`
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="${LOGO_B64}" alt="Visnam"/>
        <div><div class="brand-name">Visnam HCNS</div><div class="brand-sub">Hành chính nhân sự</div></div>
      </div>
      <nav class="sidebar-nav">${navHtml}</nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">${(S.user?.email||'H')[0].toUpperCase()}</div>
          <div><div class="user-email">${S.user?.email||''}</div><div class="user-role">HR Admin</div></div>
        </div>
        <button class="btn-logout" onclick="window._logout()">🚪 Đăng xuất</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="topbar"><div class="topbar-inner">
        <h2 class="page-title">${titles[S.page]||''}</h2>
        <div class="topbar-right">
          <span class="date-badge">${new Date().toLocaleDateString('vi-VN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
        </div>
      </div></div>
      <div class="page-body" id="pb">${renderPage()}</div>
    </main>
  </div>`;
}

function renderPage(){
  if(S.page==='chamcong')return pgChamCong();
  if(S.page==='nhanvien')return pgNhanVien();
  if(S.page==='bophan')return pgBoPhan();
  if(S.page==='ngayle')return pgNgayLe();
  if(S.page==='baocao')return pgBaoCao();
  if(S.page==='taikhoan')return pgTaiKhoan();
  return '';
}
function rePb(){document.getElementById('pb').innerHTML=renderPage();}

window._nav=p=>{S.page=p;render();};
window._logout=async()=>{await signOut(auth);};

// ─── LOGIN ───────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo"><img src="${LOGO_B64}" alt="Visnam"/></div>
      <h1 class="login-title">HCNS Visnam</h1>
      <p class="login-sub">Hệ thống hành chính nhân sự</p>
      <div class="form-group"><label>Email</label><input type="email" id="le" placeholder="hr@visnam.vn" autocomplete="email"/></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"/></div>
      <div id="lerr" class="login-err"></div>
      <button class="btn-login" id="lbtn" onclick="window._login()">Đăng nhập</button>
    </div>
  </div>`;
  setTimeout(()=>{
    document.getElementById('lp')?.addEventListener('keydown',e=>{if(e.key==='Enter')window._login();});
  },100);
}

window._login=async()=>{
  const e=document.getElementById('le')?.value.trim();
  const p=document.getElementById('lp')?.value;
  const btn=document.getElementById('lbtn');
  const err=document.getElementById('lerr');
  if(!e||!p){err.textContent='Vui lòng nhập email và mật khẩu.';return;}
  err.textContent='';btn.disabled=true;btn.textContent='Đang đăng nhập...';
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(ex){
    const msgs={'auth/user-not-found':'Email không tồn tại.','auth/wrong-password':'Mật khẩu không đúng.','auth/invalid-email':'Email không hợp lệ.','auth/too-many-requests':'Quá nhiều lần thử. Vui lòng thử lại sau.'};
    err.textContent=msgs[ex.code]||'Đăng nhập thất bại.';
    btn.disabled=false;btn.textContent='Đăng nhập';
  }
};

// ─── CHAM CONG ───────────────────────────────────────────────────
function pgChamCong(){
  const {selectedThang:th,selectedNam:nam,selectedBoPhan:sbp}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  const todayStr=new Date().toLocaleDateString('en-CA');
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===sbp);

  // Stats
  let totCong=0,totPhep=0,totVang=0,totVP=0;
  nvs.forEach(nv=>{days.forEach(d=>{const ma=S.chamCong[`${nv.id}_${d}`]?.ky_hieu||'';totCong+=tinhCong(ma);totPhep+=tinhPhep(ma);if(ma==='KL')totVang++;if(isViPham(ma))totVP++;});});

  const thOpts=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m===th?'selected':''}>${String(m).padStart(2,'0')}/${nam}</option>`).join('');
  const bpTabs=S.boPhan.map(b=>`<button class="bp-tab ${sbp===b.id?'active':''}" onclick="window._selBP('${b.id}')">${b.ten_bo_phan}</button>`).join('');
  const dayHdrs=days.map(d=>{
    const dobj=new Date(nam,th-1,d);
    const dw=dobj.getDay();
    const ds=`${nam}-${String(th).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isWE=dw===0||dw===6;
    const isHL=S.ngayLe.some(l=>l.ngay===ds);
    const isTd=ds===todayStr;
    return`<th class="day-header${isWE?' weekend':''}${isHL?' holiday':''}${isTd?' today':''}" title="${DOW_VI[dw]} ${d}/${th}">${d}<br><small>${DOW_VI[dw]}</small></th>`;
  }).join('');

  const rows=nvs.length?nvs.map(nv=>{
    let tong=0,phep=0,vang=0,vp=0;
    const cells=days.map(d=>{
      const k=`${nv.id}_${d}`;const cc=S.chamCong[k];const ma=cc?.ky_hieu||'';
      tong+=tinhCong(ma);phep+=tinhPhep(ma);
      if(ma==='KL')vang++;if(isViPham(ma))vp++;
      return`<td class="cc-cell" onclick="window._openCell('${nv.id}',${d})" title="${cc?.ghi_chu||''}"><span class="cc-badge" style="${khStyle(ma)}">${ma||'·'}</span></td>`;
    }).join('');
    return`<tr><td class="nv-name-cell">${nv.ten}</td>${cells}<td class="sum-cell">${tong}</td><td class="sum-cell phep">${phep}</td><td class="sum-cell vang">${vang}</td><td class="sum-cell vipham">${vp}</td></tr>`;
  }).join(''):'';

  return`<div class="cc-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Nhân viên</div><div class="stat-value">${nvs.length}</div><div class="stat-sub">bộ phận này</div></div>
      <div class="stat-card green"><div class="stat-label">Tổng công</div><div class="stat-value">${totCong}</div><div class="stat-sub">ngày công tháng ${th}</div></div>
      <div class="stat-card gold"><div class="stat-label">Tổng phép</div><div class="stat-value">${totPhep}</div><div class="stat-sub">ngày phép sử dụng</div></div>
      <div class="stat-card red"><div class="stat-label">Vắng KL</div><div class="stat-value">${totVang}</div><div class="stat-sub">lượt không lương</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="bp-tabs">${bpTabs||'<span style="color:#94a3b8;font-size:13px">Chưa có bộ phận</span>'}</div>
      </div>
      <div class="toolbar-right">
        <select class="sel-ctrl" onchange="window._selThang(this.value)">${thOpts}</select>
        <button class="btn-icon" onclick="window._fillMonth()">✨ Điền X tháng</button>
        <button class="btn-icon" onclick="window._clearMonth()">🗑️ Xóa tháng</button>
      </div>
    </div>
    ${nvs.length===0?`<div class="empty-state"><div class="empty-icon">👤</div>Bộ phận này chưa có nhân viên</div>`:`
    <div class="cc-table-wrap"><table class="cc-table">
      <thead><tr><th class="nv-header">Nhân viên</th>${dayHdrs}<th class="sum-header">Công</th><th class="sum-header" style="color:#f59e0b">Phép</th><th class="sum-header" style="color:var(--red)">KL</th><th class="sum-header" style="color:var(--orange)">VP</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`}
  </div>
  <div class="modal-overlay" id="cell-modal" style="display:none" onclick="if(event.target.id==='cell-modal')window._closeCellF()">
    <div class="modal-box">
      <div class="modal-header"><span id="modal-title">Chọn ký hiệu</span><button class="modal-close" onclick="window._closeCellF()">✕</button></div>
      <div class="ky-hieu-grid">${KY_HIEU.map(k=>`<button class="kh-btn" style="background:${k.mau};color:${k.text}" onclick="window._pickKH('${k.ma}')"><span class="kh-ma">${k.label}</span><span class="kh-ten">${k.ten}</span></button>`).join('')}</div>
      <div class="modal-note"><input type="text" id="modal-note" placeholder="📝 Ghi chú (tuỳ chọn)..."/><button class="btn-primary" onclick="window._saveNote()">Lưu ghi chú</button></div>
    </div>
  </div>`;
}

window._selBP=id=>{S.selectedBoPhan=id;rePb();};
window._selThang=async v=>{S.selectedThang=parseInt(v);document.getElementById('pb').innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>';await loadChamCong();rePb();};
window._selNam=v=>{S.selectedNam=parseInt(v);rePb();};

window._openCell=(nv,ng)=>{
  S._cNv=nv;S._cNg=ng;
  const n=S.nhanVien.find(x=>x.id===nv);
  const dobj=new Date(S.selectedNam,S.selectedThang-1,ng);
  document.getElementById('modal-title').textContent=`${n?.ten||''} — ${DOW_VI[dobj.getDay()]} ${ng}/${S.selectedThang}`;
  document.getElementById('modal-note').value=S.chamCong[`${nv}_${ng}`]?.ghi_chu||'';
  document.getElementById('cell-modal').style.display='flex';
};
window._closeCellF=()=>{document.getElementById('cell-modal').style.display='none';};
window._pickKH=async ma=>{
  const note=document.getElementById('modal-note').value;
  window._closeCellF();
  await saveCC(S._cNv,S._cNg,ma,note);
  showToast(ma?`Đã lưu: ${ma} ✓`:'Đã xóa ký hiệu');
  rePb();
};
window._saveNote=async()=>{
  const note=document.getElementById('modal-note').value;
  const k=`${S._cNv}_${S._cNg}`;
  if(S.chamCong[k]){await saveCC(S._cNv,S._cNg,S.chamCong[k].ky_hieu,note);window._closeCellF();showToast('Đã lưu ghi chú ✓');rePb();}
  else{window._closeCellF();}
};

window._fillMonth=async()=>{
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===S.selectedBoPhan);
  if(!nvs.length)return;
  if(!confirm(`Điền ký hiệu X cho ${nvs.length} nhân viên — chỉ các ngày chưa có ký hiệu?`))return;
  const dim=new Date(S.selectedNam,S.selectedThang,0).getDate();
  document.getElementById('pb').innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto"></div><p style="margin-top:12px">Đang điền dữ liệu...</p></div>';
  for(const nv of nvs){
    for(let d=1;d<=dim;d++){
      const k=`${nv.id}_${d}`;if(S.chamCong[k])continue;
      const dw=new Date(S.selectedNam,S.selectedThang-1,d).getDay();
      const ds=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isHL=S.ngayLe.some(l=>l.ngay===ds);
      await saveCC(nv.id,d,isHL?'NL':dw===0||dw===6?'KL':'X');
    }
  }
  showToast('Đã điền xong ✓');rePb();
};

window._clearMonth=async()=>{
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===S.selectedBoPhan);
  if(!nvs.length)return;
  if(!confirm(`⚠️ Xóa toàn bộ dữ liệu chấm công tháng ${S.selectedThang}/${S.selectedNam} của ${nvs.length} nhân viên?`))return;
  const dim=new Date(S.selectedNam,S.selectedThang,0).getDate();
  document.getElementById('pb').innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>';
  for(const nv of nvs){for(let d=1;d<=dim;d++){await saveCC(nv.id,d,'');}}
  showToast('Đã xóa dữ liệu tháng ✓');rePb();
};

// ─── NHÂN VIÊN ───────────────────────────────────────────────────
function pgNhanVien(){
  const bpOpts=`<option value="">Tất cả bộ phận</option>`+S.boPhan.map(b=>`<option value="${b.id}" ${S._nvBpFilter===b.id?'selected':''}>${b.ten_bo_phan}</option>`).join('');
  const nvs=S.nhanVien.filter(n=>{
    const mb=!S._nvBpFilter||n.bo_phan_id===S._nvBpFilter;
    const q=S._nvSearch.toLowerCase();
    const ms=!q||n.ten?.toLowerCase().includes(q)||(n.ma_nv||'').toLowerCase().includes(q)||(n.chuc_vu||'').toLowerCase().includes(q);
    return mb&&ms;
  }).sort((a,b)=>(a.ten||'').localeCompare(b.ten||'','vi'));

  const rows=nvs.map(nv=>{
    const bp=S.boPhan.find(b=>b.id===nv.bo_phan_id);
    const pct=Math.round(((nv.phep_con??nv.phep_nam??12)/(nv.phep_nam||12))*100);
    return`<tr>
      <td><b>${nv.ma_nv||'—'}</b></td>
      <td class="nv-name">${nv.ten}</td>
      <td><span class="bp-badge">${bp?.ten_bo_phan||'—'}</span></td>
      <td>${nv.chuc_vu||'—'}</td>
      <td>${fmtDate(nv.ngay_vao)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-weight:600;color:${(nv.phep_con??0)<3?'var(--red)':'var(--green)'}">${nv.phep_con??'—'}</span>
          <span style="color:var(--gray);font-size:11px">/ ${nv.phep_nam||12} ngày</span>
        </div>
        <div class="progress-bar" style="margin-top:4px"><div class="progress-fill" style="width:${pct}%;background:${pct<25?'var(--red)':'var(--green)'}"></div></div>
      </td>
      <td><div class="action-btns"><button class="btn-edit" onclick="window._editNV('${nv.id}')">✏️ Sửa</button><button class="btn-del" onclick="window._delNV('${nv.id}')">🗑️ Xóa</button></div></td>
    </tr>`;
  }).join('');

  const ed=S._editNV||{};const isNew=!ed.id;
  const bpSel=`<option value="">-- Chọn bộ phận --</option>`+S.boPhan.map(b=>`<option value="${b.id}" ${ed.bo_phan_id===b.id?'selected':''}>${b.ten_bo_phan}</option>`).join('');

  return`<div class="nv-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Tổng nhân viên</div><div class="stat-value">${S.nhanVien.length}</div></div>
      <div class="stat-card green"><div class="stat-label">Đang hiển thị</div><div class="stat-value">${nvs.length}</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="🔍 Tìm tên, mã NV, chức vụ..." value="${S._nvSearch}" oninput="window._searchNV(this.value)"/>
        <select class="sel-ctrl" onchange="window._filterBP(this.value)">${bpOpts}</select>
      </div>
      <div class="toolbar-right">
        <button class="btn-primary" onclick="window._addNV()">+ Thêm nhân viên</button>
      </div>
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Mã NV</th><th>Họ tên</th><th>Bộ phận</th><th>Chức vụ</th><th>Ngày vào</th><th>Phép còn</th><th>Thao tác</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:32px;color:#94a3b8">Không tìm thấy nhân viên nào</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="modal-overlay" id="nv-modal" style="display:${S._showNVM?'flex':'none'}" onclick="if(event.target.id==='nv-modal')window._closeNVF()">
    <div class="modal-box">
      <div class="modal-header"><span>${isNew?'➕ Thêm nhân viên':'✏️ Sửa nhân viên'}</span><button class="modal-close" onclick="window._closeNVF()">✕</button></div>
      <div class="form-grid">
        <div class="form-group form-full"><label>Họ tên *</label><input id="nv-ten" value="${ed.ten||''}" placeholder="Nguyễn Văn A"/></div>

// ─── BÁO CÁO ─────────────────────────────────────────────────────
function pgBaoCao(){
  const {selectedThang:th,selectedNam:nam}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);

  let grandTong=0,grandPhep=0,grandKL=0,grandVP=0;
  S.nhanVien.forEach(nv=>{days.forEach(d=>{const ma=S.chamCong[`${nv.id}_${d}`]?.ky_hieu||'';grandTong+=tinhCong(ma);grandPhep+=tinhPhep(ma);if(ma==='KL')grandKL++;if(isViPham(ma))grandVP++;});});

  const tables=S.boPhan.map(bp=>{
    const nvs=S.nhanVien.filter(n=>n.bo_phan_id===bp.id);
    if(!nvs.length)return'';
    let bpTong=0,bpPhep=0,bpKL=0,bpVP=0;
    const rows=nvs.map(nv=>{
      let tong=0,phep=0,nl=0,kl=0,dt=0,vs=0,vp2=0;
      days.forEach(d=>{const ma=S.chamCong[`${nv.id}_${d}`]?.ky_hieu||'';tong+=tinhCong(ma);phep+=tinhPhep(ma);if(ma==='NL')nl++;if(ma==='KL'||ma==='N/P')kl++;if(ma==='ĐT'||ma==='VS')dt++;if(ma==='ĐP'||ma==='KVS')vs++;});
      vp2=dt+vs;bpTong+=tong;bpPhep+=phep;bpKL+=kl;bpVP+=vp2;
      return`<tr>
        <td class="nv-name">${nv.ten}<br><small style="color:var(--gray)">${nv.chuc_vu||''}</small></td>
        <td class="num"><b>${tong}</b></td>
        <td class="num" style="color:#f59e0b">${phep}</td>
        <td class="num" style="color:#7c3aed">${nl}</td>
        <td class="num" style="color:var(--red)">${kl}</td>
        <td class="num" style="color:var(--orange)">${dt}</td>
        <td class="num" style="color:#c026d3">${vs}</td>
        <td class="num"><span class="badge ${vp2>0?'badge-red':'badge-green'}">${vp2>0?`${vp2} VP`:'✓'}</span></td>
      </tr>`;
    }).join('');
    grandTong=grandTong; // already summed
    return`<div class="bc-section">
      <div class="bc-bp-title">${bp.ten_bo_phan} <span class="bc-count">${nvs.length} người | Tổng công: ${bpTong} | Phép: ${bpPhep} | KL: ${bpKL} | Vi phạm: ${bpVP}</span></div>
      <table class="data-table">
        <thead><tr><th>Nhân viên</th><th>Công</th><th style="color:#f59e0b">Phép</th><th style="color:#7c3aed">Lễ</th><th style="color:var(--red)">KL</th><th style="color:var(--orange)">Đi trễ/về sớm</th><th style="color:#c026d3">Vi phạm khác</th><th>Đánh giá</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  const thOpts=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m===th?'selected':''}>Tháng ${m}/${nam}</option>`).join('');
  return`<div class="bc-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Nhân viên</div><div class="stat-value">${S.nhanVien.length}</div></div>
      <div class="stat-card green"><div class="stat-label">Tổng công</div><div class="stat-value">${grandTong}</div><div class="stat-sub">ngày tháng ${th}/${nam}</div></div>
      <div class="stat-card gold"><div class="stat-label">Tổng phép</div><div class="stat-value">${grandPhep}</div></div>
      <div class="stat-card red"><div class="stat-label">Vi phạm</div><div class="stat-value">${grandVP}</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <select class="sel-ctrl" onchange="window._selThang(this.value)">${thOpts}</select>
      </div>
      <div class="toolbar-right">
        <button class="btn-export" onclick="window._exportCSV()">📥 Xuất Excel (CSV)</button>
      </div>
    </div>
    ${tables||'<div class="empty-state"><div class="empty-icon">📊</div>Chưa có dữ liệu chấm công tháng ${th}/${nam}</div>'}
  </div>`;
}

window._exportCSV=()=>{
  const {selectedThang:th,selectedNam:nam}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  let csv='\uFEFF';
  csv+=`Báo cáo chấm công Tháng ${th}/${nam}\n`;
  csv+=`Ngày xuất: ${new Date().toLocaleString('vi-VN')}\n\n`;
  csv+=`Bộ phận,Mã NV,Nhân viên,Chức vụ,${days.map(d=>`Ngày ${d}`).join(',')},Tổng công,Phép,Nghỉ lễ,Không lương,Đi trễ/về sớm,Vi phạm khác\n`;
  S.boPhan.forEach(bp=>{
    S.nhanVien.filter(n=>n.bo_phan_id===bp.id).forEach(nv=>{
      let tong=0,phep=0,nl=0,kl=0,dt=0,vp=0;
      const cells=days.map(d=>{const ma=S.chamCong[`${nv.id}_${d}`]?.ky_hieu||'';tong+=tinhCong(ma);phep+=tinhPhep(ma);if(ma==='NL')nl++;if(ma==='KL'||ma==='N/P')kl++;if(ma==='ĐT'||ma==='VS')dt++;if(ma==='ĐP'||ma==='KVS')vp++;return ma||'';});
      csv+=`${bp.ten_bo_phan},${nv.ma_nv||''},${nv.ten},${nv.chuc_vu||''},${cells.join(',')},${tong},${phep},${nl},${kl},${dt},${vp}\n`;
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`cham_cong_T${th}_${nam}.csv`;a.click();URL.revokeObjectURL(url);
  showToast('Đã xuất file CSV ✓');
};

window._createUser=async()=>{
  const email=document.getElementById('au-email').value.trim();
  const pass=document.getElementById('au-pass').value;
  const pass2=document.getElementById('au-pass2').value;
  const err=document.getElementById('au-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Vui lòng điền đầy đủ email và mật khẩu.';return;}
  if(pass.length<6){err.textContent='Mật khẩu phải có ít nhất 6 ký tự.';return;}
  if(pass!==pass2){err.textContent='Mật khẩu xác nhận không khớp.';return;}
  try{
    await createUserWithEmailAndPassword(auth,email,pass);
    // After creating, need to re-login as original user won't persist here automatically
    showToast(`Đã tạo tài khoản ${email} ✓`);
    document.getElementById('au-email').value='';
    document.getElementById('au-pass').value='';
    document.getElementById('au-pass2').value='';
    err.textContent='';
  }catch(e){
    const msgs={'auth/email-already-in-use':'Email này đã tồn tại trong hệ thống.','auth/invalid-email':'Email không hợp lệ.','auth/weak-password':'Mật khẩu quá yếu.'};
    err.textContent=msgs[e.code]||`Lỗi: ${e.message}`;
  }
};

window._changePass=async()=>{
  const oldP=document.getElementById('cp-old').value;
  const newP=document.getElementById('cp-new').value;
  const newP2=document.getElementById('cp-new2').value;
  const err=document.getElementById('cp-err');
  err.textContent='';
  if(!oldP||!newP){err.textContent='Vui lòng điền đầy đủ.';return;}
  if(newP.length<6){err.textContent='Mật khẩu mới phải có ít nhất 6 ký tự.';return;}
  if(newP!==newP2){err.textContent='Mật khẩu xác nhận không khớp.';return;}
  try{
    const cred=EmailAuthProvider.credential(S.user.email,oldP);
    await reauthenticateWithCredential(S.user,cred);
    await updatePassword(S.user,newP);
    showToast('Đã đổi mật khẩu thành công ✓');
    document.getElementById('cp-old').value='';
    document.getElementById('cp-new').value='';
    document.getElementById('cp-new2').value='';
  }catch(e){
    const msgs={'auth/wrong-password':'Mật khẩu hiện tại không đúng.','auth/too-many-requests':'Quá nhiều lần thử.'};
    err.textContent=msgs[e.code]||`Lỗi: ${e.message}`;
  }
};
</script>
