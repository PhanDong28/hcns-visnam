<style>

.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:0 4px}
.modal-close:hover{color:#475569}
.ky-hieu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:16px}
.kh-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .15s}
.kh-btn:hover{transform:scale(1.05);opacity:.9}
.kh-ma{font-size:14px;font-weight:700}
.kh-ten{font-size:9px;text-align:center;line-height:1.2;opacity:.85}
.modal-note{padding:0 16px 16px;display:flex;gap:8px}
.modal-note input{flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none}

.search-input{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:220px}
.search-input:focus{border-color:#1e4d8c}
.table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.data-table thead tr{background:#f8fafc}
.data-table th{padding:11px 14px;text-align:left;font-size:12px;font-weight:600;color:#475569;border-bottom:1px solid #e2e8f0}
.data-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#374151}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:#f8fafc}
.nv-name{font-weight:500;color:#1a1a2e}
.bp-badge{display:inline-block;padding:2px 10px;background:#eff6ff;color:#1e4d8c;border-radius:20px;font-size:11px;font-weight:500}
.phep-cell{color:#059669;font-weight:500}
.empty-cell{text-align:center;color:#94a3b8;padding:32px!important}
.empty-state{text-align:center;color:#94a3b8;padding:48px 24px;background:#fff;border-radius:12px}
.num{text-align:center;font-weight:500}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px}
.form-grid .form-group{margin:0}
.form-grid .form-group:first-child{grid-column:span 2}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #e2e8f0}
.bp-list{display:flex;flex-direction:column;gap:8px}
.bp-total{font-size:13px;color:#64748b;font-weight:500}
.bp-item{background:#fff;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.06);gap:12px}
.bp-info{display:flex;align-items:center;gap:12px;flex:1}
.bp-icon{font-size:22px}
.bp-name{font-size:14px;font-weight:600;color:#1a1a2e}
.bp-count{font-size:12px;color:#64748b;margin-top:2px}
.bp-order{font-size:12px;color:#94a3b8;white-space:nowrap}
.bc-section{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px}
.bc-bp-title{padding:12px 16px;font-size:14px;font-weight:700;color:#1e4d8c;background:#eff6ff;border-bottom:1px solid #dbeafe;display:flex;align-items:center;gap:8px}
.bc-count{font-size:12px;font-weight:400;color:#64748b}
.badge-green{display:inline-block;padding:2px 10px;background:#dcfce7;color:#166534;border-radius:20px;font-size:11px;font-weight:500}
.badge-red{display:inline-block;padding:2px 10px;background:#fee2e2;color:#991b1b;border-radius:20px;font-size:11px;font-weight:500}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div id="loading">
  <div class="loading-inner">
    
    <div class="spinner"></div>
    <div style="font-size:13px;color:#64748b;font-weight:500">Đang kết nối hệ thống...</div>
  </div>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,getDocs,addDoc,updateDoc,deleteDoc,doc,setDoc,query,orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const LOGO = "";

const firebaseConfig={apiKey:"AIzaSyDBs_hnuZzp9cOiivxMB7DQXwUZBYOGQNg",authDomain:"hcns-71a4a.firebaseapp.com",projectId:"hcns-71a4a",storageBucket:"hcns-71a4a.firebasestorage.app",messagingSenderId:"826175179566",appId:"1:826175179566:web:d0b3ea538055c3f9ebc8bf",measurementId:"G-QC8E7EZKVT"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

// ── IMPORTANT: fix file:// CORS by setting persistence to none ──
// Auth state timeout fallback
let authResolved=false;
setTimeout(()=>{if(!authResolved){hideLoading();renderLogin();}},6000);

let S={user:null,page:'chamcong',boPhan:[],nhanVien:[],chamCong:{},ngayLe:[],selectedBoPhan:null,selectedThang:new Date().getMonth()+1,selectedNam:new Date().getFullYear(),_nvBpFilter:'',_nvSearch:''};

const KY_HIEU=[
  {ma:'X',   label:'X',   ten:'1 ngày công',        mau:'#22c55e',text:'#fff'},
  {ma:'X/2', label:'X/2', ten:'Nửa ngày công',       mau:'#86efac',text:'#166534'},
  {ma:'CT',  label:'CT',  ten:'Công tác',             mau:'#3b82f6',text:'#fff'},
  {ma:'P',   label:'P',   ten:'Nghỉ có phép',         mau:'#f59e0b',text:'#fff'},
  {ma:'P/2', label:'P/2', ten:'Làm 0.5, NP 0.5',     mau:'#fcd34d',text:'#92400e'},
  {ma:'NL',  label:'NL',  ten:'Nghỉ lễ có lương',    mau:'#a78bfa',text:'#fff'},
  {ma:'KL',  label:'KL',  ten:'Không lương',          mau:'#ef4444',text:'#fff'},
  {ma:'N/P', label:'N/P', ten:'KL 0.5 + P 0.5',      mau:'#f87171',text:'#fff'},
  {ma:'TS',  label:'TS',  ten:'Nghỉ sinh',            mau:'#fb923c',text:'#fff'},
  {ma:'NB',  label:'NB',  ten:'Nghỉ bảo hiểm',       mau:'#fdba74',text:'#7c2d12'},
  {ma:'NV',  label:'NV',  ten:'Nghỉ việc',            mau:'#6b7280',text:'#fff'},
  {ma:'ĐT',  label:'ĐT',  ten:'Đi trễ',              mau:'#f97316',text:'#fff'},
  {ma:'ĐP',  label:'ĐP',  ten:'Không đồng phục',     mau:'#e879f9',text:'#fff'},
  {ma:'VS',  label:'VS',  ten:'Về sớm',              mau:'#c084fc',text:'#fff'},
  {ma:'KVS', label:'KVS', ten:'Không về sinh',       mau:'#d946ef',text:'#fff'},
  {ma:'',    label:'–',   ten:'Xóa ký hiệu',         mau:'#e5e7eb',text:'#6b7280'},
];

function khStyle(ma){const k=KY_HIEU.find(x=>x.ma===ma);if(!k||!ma)return 'background:#f3f4f6;color:#9ca3af';return `background:${k.mau};color:${k.text}`;}
function tinhCong(ma){return({X:1,'X/2':.5,CT:1,P:1,'P/2':.5,NL:1,KL:0,'N/P':.5,TS:0,NB:0,NV:0,ĐT:1,ĐP:1,VS:1,KVS:1})[ma]??0;}
function tinhPhep(ma){return ma==='P'?1:(ma==='P/2'||ma==='N/P')?.5:0;}

function hideLoading(){const el=document.getElementById('loading');if(el)el.style.display='none';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

onAuthStateChanged(auth,user=>{
  authResolved=true;
  S.user=user;
  if(user){initApp();}
  else{hideLoading();renderLogin();}
});

async function initApp(){
  try{
    await Promise.all([loadBoPhan(),loadNhanVien(),loadChamCong(),loadNgayLe()]);
  }catch(e){console.warn('Load error:',e);}
  hideLoading();
  render();
}

async function loadBoPhan(){const snap=await getDocs(query(collection(db,'bo_phan'),orderBy('thu_tu')));S.boPhan=snap.docs.map(d=>({id:d.id,...d.data()}));if(!S.selectedBoPhan&&S.boPhan.length>0)S.selectedBoPhan=S.boPhan[0].id;}
async function loadNhanVien(){const snap=await getDocs(collection(db,'nhan_vien'));S.nhanVien=snap.docs.map(d=>({id:d.id,...d.data()}));}
async function loadChamCong(){const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;try{const snap=await getDocs(collection(db,`cham_cong/${key}/records`));S.chamCong={};snap.docs.forEach(d=>{S.chamCong[d.id]=d.data();});}catch(e){S.chamCong={};}}
async function loadNgayLe(){const snap=await getDocs(collection(db,'ngay_le'));S.ngayLe=snap.docs.map(d=>({id:d.id,...d.data()}));}
async function saveTruc(nvId, gioTruc){
  const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;
  const k=`truc_${nvId}`;
  if(!gioTruc || gioTruc<=0){
    await deleteDoc(doc(db,`cham_cong/${key}/records`,k));
    delete S.chamCong[k];
  } else {
    const data={nv_id:nvId, gio_truc:gioTruc, cap_nhat:new Date().toISOString()};
    await setDoc(doc(db,`cham_cong/${key}/records`,k),data);
    S.chamCong[k]=data;
  }
}
async function saveCC(nvId,ngay,ma,ghiChu=''){const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;const k=`${nvId}_${ngay}`;if(!ma){await deleteDoc(doc(db,`cham_cong/${key}/records`,k));delete S.chamCong[k];}else{const data={nv_id:nvId,ngay,ky_hieu:ma,ghi_chu:ghiChu,cap_nhat:new Date().toISOString()};await setDoc(doc(db,`cham_cong/${key}/records`,k),data);S.chamCong[k]=data;}}

// ── LOGIN ──
function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo"><img src="${LOGO}" alt="Visnam HCNS"/></div>
      <h1 class="login-title">Hệ thống chấm công</h1>
      <p class="login-sub">Hành chính nhân sự Visnam</p>
      <div class="form-group"><label>Email HR</label><input type="email" id="le" placeholder="hr@visnam.vn" autocomplete="email"/></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"/></div>
      <div id="lerr" class="login-err"></div>
      <button class="btn-login" id="lbtn" onclick="window._login()">Đăng nhập</button>
    </div>
  </div>`;
  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')window._login();});
}

window._login=async function(){
  const e=document.getElementById('le').value.trim();
  const p=document.getElementById('lp').value;
  const btn=document.getElementById('lbtn');
  const err=document.getElementById('lerr');
  err.textContent='';btn.disabled=true;btn.textContent='Đang đăng nhập...';
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(ex){err.textContent='Email hoặc mật khẩu không đúng.';btn.disabled=false;btn.textContent='Đăng nhập';}
};

// ── MAIN ──
function render(){
  const titles={chamcong:'Bảng chấm công',nhanvien:'Quản lý nhân viên',bophan:'Quản lý bộ phận',ngayle:'Ngày lễ & phép năm',baocao:'Báo cáo tháng'};
  const menu=[{id:'chamcong',icon:'📅',label:'Chấm công'},{id:'nhanvien',icon:'👥',label:'Nhân viên'},{id:'bophan',icon:'🏢',label:'Bộ phận'},{id:'ngayle',icon:'🎌',label:'Ngày lễ'},{id:'baocao',icon:'📊',label:'Báo cáo'}];
  document.getElementById('app').innerHTML=`
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="${LOGO}" alt="Visnam"/>
        <div><div class="brand-name">Visnam</div><div class="brand-sub">Hành chính nhân sự</div></div>
      </div>
      <nav class="sidebar-nav">
        ${menu.map(m=>`<button class="nav-item ${S.page===m.id?'active':''}" onclick="window._nav('${m.id}')"><span class="nav-icon">${m.icon}</span><span>${m.label}</span></button>`).join('')}

      <div class="sidebar-footer">

}

function renderPage(){
  if(S.page==='chamcong')return pgChamCong();
  if(S.page==='nhanvien')return pgNhanVien();
  if(S.page==='bophan')return pgBoPhan();
  if(S.page==='ngayle')return pgNgayLe();
  if(S.page==='baocao')return pgBaoCao();
  return '';
}
function rePb(){document.getElementById('pb').innerHTML=renderPage();}

window._nav=function(p){S.page=p;render();};
window._logout=async function(){await signOut(auth);};
window._selBP=function(id){S.selectedBoPhan=id;rePb();};
window._selThang=async function(v){S.selectedThang=parseInt(v);document.getElementById('pb').innerHTML='<div class="empty-state">Đang tải...</div>';await loadChamCong();rePb();};
window._selNam=function(v){S.selectedNam=parseInt(v);rePb();};
window._searchNV=function(v){S._nvSearch=v;rePb();};
window._filterBP=function(v){S._nvBpFilter=v;rePb();};

// ── CHAM CONG ──
function pgChamCong(){
  const {selectedThang:th,selectedNam:nam,selectedBoPhan:sbp}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===sbp);
  const thOpts=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m===th?'selected':''}>${String(m).padStart(2,'0')}/${nam}</option>`).join('');
  const bpTabs=S.boPhan.map(b=>`<button class="bp-tab ${sbp===b.id?'active':''}" onclick="window._selBP('${b.id}')">${b.ten_bo_phan}</button>`).join('');
  const dayHdrs=days.map(d=>{const dw=new Date(nam,th-1,d).getDay();const isWE=dw===0||dw===6;const isHL=S.ngayLe.some(l=>l.ngay===`${nam}-${String(th).padStart(2,'0')}-${String(d).padStart(2,'0')}`);const lbl=['CN','T2','T3','T4','T5','T6','T7'][dw];return`<th class="day-header ${isWE?'weekend':''} ${isHL?'holiday':''}" title="${lbl}">${d}</th>`;}).join('');
const rows=nvs.map(nv=>{
  let tong=0,phep=0,vang=0,vp=0;
  const cells=days.map(d=>{
    const k=`${nv.id}_${d}`;
    const cc=S.chamCong[k];
    const ma=cc?.ky_hieu||'';
    tong+=tinhCong(ma);
    phep+=tinhPhep(ma);
    if(ma==='KL')vang++;
    if(['ĐT','ĐP','VS','KVS'].includes(ma))vp++;
    return`<td class="cc-cell" onclick="window._openCell('${nv.id}',${d})" title="${cc?.ghi_chu||''}"><span class="cc-badge" style="${khStyle(ma)}">${ma||'·'}</span></td>`;
  }).join('');

  // Lấy giờ trực đã lưu
  const trucKey = `truc_${nv.id}`;
  const gioTruc = S.chamCong[trucKey]?.gio_truc || 0;
  const congTruc = gioTruc / 8;
  const tongCongTinh = tong + congTruc;

  return`<tr>
    <td class="nv-name-cell">${nv.ten}</td>
    ${cells}
    <td class="sum-cell">${tong}</td>
    <td class="sum-cell phep">${phep}</td>
    <td class="sum-cell vang">${vang}</td>
    <td class="sum-cell vipham">${vp}</td>
    <td class="sum-cell" style="color:#0f766e;padding:3px 6px">
      <input type="number" min="0" max="999" step="0.5"
        value="${gioTruc||''}"
        placeholder="0"
        style="width:56px;border:1.5px solid #d1fae5;border-radius:6px;padding:3px 6px;font-size:12px;font-weight:600;color:#0f766e;text-align:center;outline:none;font-family:inherit;background:#f0fdf4"
        onchange="window._saveTruc('${nv.id}',this.value)"
        onclick="event.stopPropagation()"
      />
    </td>
    <td class="sum-cell" style="color:#7c3aed;font-size:13px;font-weight:700">${tongCongTinh.toFixed(2).replace(/\.00$/,'')}</td>
  </tr>`;
}).join('');
  return`<div class="cc-wrap">
    <div class="cc-toolbar">
      <div class="bp-tabs">${bpTabs||'<span style="color:#94a3b8;font-size:13px">Chưa có bộ phận — hãy thêm bộ phận trước</span>'}</div>
      <div class="cc-controls">
        <select class="sel-thang" onchange="window._selThang(this.value)">${thOpts}</select>
        <button class="btn-icon" onclick="window._fillMonth()">✨ Điền X tháng</button>
        <button class="btn-bulk" onclick="window._openBulk()" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">☑️ Điểm danh hàng loạt</button>
      </div>
    </div>
    ${nvs.length===0?'<div class="empty-state">Bộ phận này chưa có nhân viên</div>':`
    <div class="cc-table-wrap"><table class="cc-table">
      <thead><tr><th class="nv-header">Nhân viên</th>${dayHdrs}
      <th class="sum-header">Công</th>
      <th class="sum-header" style="color:#f59e0b">Phép</th>
      <th class="sum-header" style="color:#ef4444">KL</th>
      <th class="sum-header" style="color:#f97316">VP</th>
      <th class="sum-header" style="color:#0f766e">Giờ trực</th>
      <th class="sum-header" style="color:#7c3aed;min-width:70px">Tổng công tính</th></thead>
      <tbody>${rows}</tbody>
    </table></div>`}
  </div>
  <div class="modal-overlay" id="bulk-modal" style="display:none" onclick="if(event.target.id==='bulk-modal')window._closeBulk()">
  <div class="modal-box" style="max-width:580px;max-height:90vh;overflow-y:auto">
    <div class="modal-header">
      <span>☑️ Điểm danh hàng loạt</span>
      <button class="modal-close" onclick="window._closeBulk()">✕</button>
    </div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:14px">

      <div>
        <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Chọn nhân viên</div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <button onclick="window._bulkSelAll(true)" style="font-size:12px;padding:5px 12px;background:#eff6ff;color:#1e4d8c;border:1px solid #bfdbfe;border-radius:6px;cursor:pointer;font-family:inherit">✅ Chọn tất cả</button>
          <button onclick="window._bulkSelAll(false)" style="font-size:12px;padding:5px 12px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-family:inherit">☐ Bỏ chọn</button>
        </div>
        <div id="bulk-nv-list" style="border:1.5px solid #e2e8f0;border-radius:10px;padding:10px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Từ ngày</div>
          <input type="number" id="bulk-from" min="1" max="31" value="1"
            style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none"/>
        </div>
        <div>
          <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Đến ngày</div>
          <input type="number" id="bulk-to" min="1" max="31" value="31"
            style="width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none"/>
        </div>
      </div>

      <div>
        <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Chọn ký hiệu áp dụng</div>
        <div id="bulk-kh-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px"></div>
        <div style="margin-top:8px;font-size:13px;color:#475569">Đang chọn: <strong id="bulk-kh-show" style="color:#1e4d8c">— Chưa chọn —</strong></div>
      </div>

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label style="font-size:13px;color:#475569;display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="bulk-skip" checked style="accent-color:#1e4d8c;width:15px;height:15px"/>
          Bỏ qua ô đã có ký hiệu (an toàn)
        </label>
      </div>

      <div style="background:#fef9ec;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e">
        ⚠️ Nếu bỏ tích "bỏ qua", tất cả ô trong khoảng sẽ bị ghi đè.
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="window._closeBulk()">Huỷ</button>
      <button class="btn-primary" onclick="window._applyBulk()" style="background:linear-gradient(135deg,#7c3aed,#6d28d9)">✅ Áp dụng</button>
    </div>
  </div>
</div>
  <div class="modal-overlay" id="cell-modal" style="display:none" onclick="if(event.target.id==='cell-modal')window._closeCellF()">
    <div class="modal-box">
      <div class="modal-header"><span id="modal-title">Chọn ký hiệu</span><button class="modal-close" onclick="window._closeCellF()">✕</button></div>
      <div class="ky-hieu-grid">${KY_HIEU.map(k=>`<button class="kh-btn" style="background:${k.mau};color:${k.text}" onclick="window._pickKH('${k.ma}')"><span class="kh-ma">${k.label}</span><span class="kh-ten">${k.ten}</span></button>`).join('')}</div>
      <div class="modal-note"><input type="text" id="modal-note" placeholder="Ghi chú (tuỳ chọn)..."/></div>
    </div>
  </div>`;
}

let _cNv,_cNg;
window._openCell=function(nv,ng){_cNv=nv;_cNg=ng;const n=S.nhanVien.find(x=>x.id===nv);document.getElementById('modal-title').textContent=`${n?.ten||''} — Ngày ${ng}`;document.getElementById('modal-note').value=S.chamCong[`${nv}_${ng}`]?.ghi_chu||'';document.getElementById('cell-modal').style.display='flex';};
window._closeCellF=function(){document.getElementById('cell-modal').style.display='none';};
window._pickKH=async function(ma){const note=document.getElementById('modal-note').value;window._closeCellF();await saveCC(_cNv,_cNg,ma,note);showToast(ma?'Đã lưu ký hiệu ✓':'Đã xóa ký hiệu');rePb();};
window._saveTruc=async function(nvId, val){
  const gio = parseFloat(val)||0;
  await saveTruc(nvId, gio);
  // Tính lại và cập nhật ô Tổng công tính ngay lập tức
  const trucKey=`truc_${nvId}`;
  const gioTruc=S.chamCong[trucKey]?.gio_truc||0;
  const dim=new Date(S.selectedNam,S.selectedThang,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  let tong=0;
  days.forEach(d=>{const ma=S.chamCong[`${nvId}_${d}`]?.ky_hieu||'';tong+=tinhCong(ma);});
  const tongTinh=tong+(gioTruc/8);
  showToast(`Đã lưu ${gioTruc}h trực → +${(gioTruc/8).toFixed(2)} công ✓`);
};
  window._fillMonth=async function(){
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===S.selectedBoPhan);
  if(!nvs.length)return;
  if(!confirm(`Điền X cho ${nvs.length} nhân viên — các ngày thường chưa có ký hiệu?`))return;
  const dim=new Date(S.selectedNam,S.selectedThang,0).getDate();
  document.getElementById('pb').innerHTML='<div class="empty-state">Đang điền dữ liệu...</div>';
  for(const nv of nvs){
    for(let d=1;d<=dim;d++){
      const k=`${nv.id}_${d}`;if(S.chamCong[k])continue;
      const dw=new Date(S.selectedNam,S.selectedThang-1,d).getDay();
      const isHL=S.ngayLe.some(l=>l.ngay===`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
      const isWE=dw===0||dw===6;
      await saveCC(nv.id,d,isHL?'NL':isWE?'KL':'X');
    }
  }
  showToast('Đã điền xong ✓');rePb();
};

  const nvs=S.nhanVien.filter(n=>{const mb=!S._nvBpFilter||n.bo_phan_id===S._nvBpFilter;const ms=!S._nvSearch||n.ten.toLowerCase().includes(S._nvSearch.toLowerCase())||(n.ma_nv||'').toLowerCase().includes(S._nvSearch.toLowerCase());return mb&&ms;});

window._readCSV = function(input) {
  const file = input.files[0];
  if (!file) return;

  // Đọc dưới dạng ArrayBuffer để tự detect encoding
  const reader = new FileReader();
  reader.onload = function(e) {
    const buffer = e.target.result;
    const uint8 = new Uint8Array(buffer);

    // Kiểm tra BOM để biết encoding
    let text = '';
    if (uint8[0] === 0xEF && uint8[1] === 0xBB && uint8[2] === 0xBF) {
      // UTF-8 with BOM
      text = new TextDecoder('utf-8').decode(buffer);
    } else {
      // Thử UTF-8 trước
      const utf8Text = new TextDecoder('utf-8').decode(buffer);
      // Kiểm tra có ký tự lỗi không (replacement character)
      if (utf8Text.includes('\uFFFD')) {
        // Bị lỗi → thử Windows-1252 (encoding mặc định của Excel VN)
        text = new TextDecoder('windows-1252').decode(buffer);
      } else {
        text = utf8Text;
      }
    }

    // ── Phần xử lý CSV (giữ nguyên như cũ từ đây) ──
    const sep = text.includes('\t') ? '\t' : ',';
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('File CSV phải có ít nhất 1 dòng dữ liệu!'); return; }

    const headers = lines[0].split(sep).map(h => h.trim().replace(/^\uFEFF/, '').toLowerCase());
    const tenIdx  = headers.indexOf('ten');
    const bpIdx   = headers.indexOf('bo_phan');
    if (tenIdx === -1) { alert('Thiếu cột "ten" trong file CSV!'); return; }
    if (bpIdx  === -1) { alert('Thiếu cột "bo_phan" trong file CSV!'); return; }

    const maIdx   = headers.indexOf('ma_nv');
    const cvIdx   = headers.indexOf('chuc_vu');
    const ngayIdx = headers.indexOf('ngay_vao');
    const pnIdx   = headers.indexOf('phep_nam');
    const pcIdx   = headers.indexOf('phep_con');

    _importRows = [];
    const warns = [];

    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
      const ten   = cols[tenIdx]  || '';
      const bpTen = cols[bpIdx]   || '';
      if (!ten) { warns.push(`Dòng ${i+1}: Bỏ qua vì thiếu tên`); continue; }

      // So sánh tên bộ phận không phân biệt hoa thường + trim
      const bp = S.boPhan.find(b =>
        b.ten_bo_phan.trim().toLowerCase() === bpTen.trim().toLowerCase()
      );
      if (!bp) {
        warns.push(`Dòng ${i+1}: Bộ phận "${bpTen}" không khớp → để trống`);
      }

      _importRows.push({
        ten,
        ma_nv    : maIdx   >= 0 ? cols[maIdx]   || '' : '',
        bo_phan_id : bp?.id || '',
        bo_phan_ten: bpTen,
        chuc_vu  : cvIdx   >= 0 ? cols[cvIdx]   || '' : '',
        ngay_vao : ngayIdx >= 0 ? cols[ngayIdx]  || '' : '',
        phep_nam : parseInt(pnIdx >= 0 ? cols[pnIdx] : '') || 12,
        phep_con : parseInt(pcIdx >= 0 ? cols[pcIdx] : '') || 12,
        _ok: !!bp
      });
    }

    // Render preview (giữ nguyên như cũ)
    document.getElementById('import-preview').style.display = 'block';
    document.getElementById('import-count-badge').textContent = `${_importRows.length} nhân viên`;
    document.getElementById('import-thead').innerHTML = `<tr>${
      ['Tên','Mã NV','Bộ phận','Chức vụ','Ngày vào','Phép/năm','Phép còn']
      .map(h=>`<th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:#475569;border-bottom:1px solid #e2e8f0;white-space:nowrap">${h}</th>`)
      .join('')}</tr>`;
    document.getElementById('import-tbody').innerHTML = _importRows.map(r=>`
      <tr style="background:${r._ok?'#fff':'#fffbeb'}">
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-weight:500;font-size:12px">${r.ten}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b">${r.ma_nv||'—'}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px">
          <span style="padding:2px 8px;border-radius:20px;font-size:11px;${r._ok?'background:#eff6ff;color:#1e4d8c':'background:#fef9ec;color:#b45309'}">${r.bo_phan_ten||'—'}</span>
        </td>
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b">${r.chuc_vu||'—'}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;color:#64748b">${r.ngay_vao||'—'}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;text-align:center">${r.phep_nam}</td>
        <td style="padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;text-align:center">${r.phep_con}</td>
      </tr>`).join('');

    const warnEl = document.getElementById('import-warn');
    if (warns.length) {
      warnEl.style.display = 'block';
      warnEl.innerHTML = '⚠️ Lưu ý:<br>' + warns.join('<br>');
    } else {
      warnEl.style.display = 'none';
    }
    document.getElementById('import-confirm-btn').style.display = _importRows.length ? 'block' : 'none';
  };

  // Đọc dưới dạng ArrayBuffer thay vì Text
  reader.readAsArrayBuffer(file);
};
   
window._doImport=async function(){
  if(!_importRows.length)return;
  if(!confirm(`Nhập ${_importRows.length} nhân viên vào hệ thống?`))return;
  window._closeImport();
  document.getElementById('pb').innerHTML='<div class="empty-state" style="padding:48px"><div class="spinner" style="margin:0 auto 16px"></div>Đang nhập dữ liệu...</div>';
  let ok=0;
  for(const row of _importRows){
    const data={ten:row.ten,bo_phan_id:row.bo_phan_id,ma_nv:row.ma_nv,chuc_vu:row.chuc_vu,ngay_vao:row.ngay_vao,phep_nam:row.phep_nam,phep_con:row.phep_con};
    const r=await addDoc(collection(db,'nhan_vien'),data);
    S.nhanVien.push({id:r.id,...data});
    ok++;
  }
  showToast(`Đã nhập ${ok} nhân viên thành công ✓`);
  rePb();
};
</script>
</body>
