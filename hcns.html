body{font-family:'Be Vietnam Pro',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
#loading{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
.loading-inner{text-align:center}
.spinner{width:44px;height:44px;border:3px solid #e2e8f0;border-top-color:#1e4d8c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-logo{width:90px;margin:0 auto 20px;display:block;border-radius:50%;background:#000;padding:8px}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e4d8c 0%,#0f2d5c 50%,#f5a623 100%)}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:16px}
.login-logo img{width:110px;height:auto;border-radius:50%;background:#000;padding:8px}
.login-title{font-size:22px;font-weight:700;color:#1e4d8c;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#f5a623;text-align:center;font-weight:500;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:#1e4d8c}
.login-err{color:#ef4444;font-size:13px;margin-bottom:12px;min-height:18px;text-align:center}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#1e4d8c,#2563eb);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#0f2d5c 0%,#1e4d8c 100%);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.main-content{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo img{width:40px;height:40px;object-fit:contain;border-radius:50%;background:#000;padding:4px;flex-shrink:0}
.brand-name{color:#fff;font-size:15px;font-weight:700;line-height:1.2}
.brand-sub{color:#f5a623;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:none;border:none;color:rgba(255,255,255,.7);font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer;border-radius:10px;transition:all .2s;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(245,166,35,.2);color:#f5a623;border:1px solid rgba(245,166,35,.3)}
.nav-icon{font-size:16px}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.user-info{display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:8px}
.user-avatar{width:32px;height:32px;background:#f5a623;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.user-email{font-size:11px;color:rgba(255,255,255,.9);word-break:break-all}
.user-role{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.btn-logout{width:100%;padding:8px;background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-logout:hover{background:rgba(239,68,68,.3)}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;width:100%}
.page-title{font-size:17px;font-weight:700;color:#1e4d8c}
.date-badge{font-size:12px;color:#64748b;background:#f8fafc;padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0}
.page-body{padding:20px 24px;flex:1}
.btn-primary{background:#1e4d8c;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary:hover{background:#1a3f75}
.btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-export{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-edit{background:#eff6ff;color:#1e4d8c;border:1px solid #bfdbfe;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-del{background:#fef2f2;color:#ef4444;border:1px solid #fecaca;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-icon{background:#fff;color:#475569;border:1px solid #e2e8f0;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-icon:hover{background:#f8fafc;border-color:#cbd5e1}
.action-btns{display:flex;gap:4px}
.cc-wrap,.nv-wrap,.nl-wrap,.bc-wrap,.bp-wrap{display:flex;flex-direction:column;gap:12px}
.cc-toolbar,.nv-toolbar,.nl-toolbar,.bc-toolbar,.bp-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.bp-tabs{display:flex;gap:6px;flex-wrap:wrap}
.bp-tab{padding:7px 16px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.bp-tab:hover{border-color:#93c5fd;color:#1e4d8c}
.bp-tab.active{background:#1e4d8c;color:#fff;border-color:#1e4d8c}
.cc-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sel-thang,.sel-nam,.sel-bp{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;cursor:pointer}
.sel-thang:focus,.sel-nam:focus{border-color:#1e4d8c}
.cc-table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cc-table{border-collapse:collapse;background:#fff;min-width:max-content;width:100%}
.cc-table th,.cc-table td{border:1px solid #f1f5f9}
.nv-header{position:sticky;left:0;z-index:10;background:#f8fafc;padding:10px 14px;font-size:12px;font-weight:600;color:#475569;text-align:left;min-width:140px}
.day-header{padding:8px 4px;font-size:11px;font-weight:600;color:#64748b;text-align:center;min-width:32px;background:#f8fafc}
.day-header.weekend{color:#94a3b8;background:#f1f5f9}
.day-header.holiday{color:#a78bfa;background:#f5f3ff}
.sum-header{padding:8px 8px;font-size:11px;font-weight:700;color:#1e4d8c;text-align:center;background:#eff6ff;min-width:42px}
.nv-name-cell{position:sticky;left:0;z-index:5;background:#fff;padding:8px 14px;font-size:13px;font-weight:500;color:#1a1a2e;min-width:140px;white-space:nowrap}
.cc-cell{padding:3px;text-align:center;cursor:pointer;transition:background .1s}
.cc-cell:hover{background:#f0f9ff}
.cc-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:24px;border-radius:6px;font-size:11px;font-weight:600;padding:0 4px;cursor:pointer;transition:transform .1s}
.cc-badge:hover{transform:scale(1.1)}
.sum-cell{padding:6px 8px;text-align:center;font-size:12px;font-weight:600;color:#1e4d8c;background:#f8fafc}
.sum-cell.phep{color:#f59e0b}
.sum-cell.vang{color:#ef4444}
.sum-cell.vipham{color:#f97316}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:90%;max-width:540px;overflow:hidden}
.modal-form{max-width:480px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e2e8f0;font-size:15px;font-weight:600;color:#1e4d8c}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:0 4px}
.modal-close:hover{color:#475569}
.ky-hieu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:16px}
.kh-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .15s}
.kh-btn:hover{transform:scale(1.05);opacity:.9}
.kh-ma{font-size:14px;font-weight:700}
.kh-ten{font-size:9px;text-align:center;line-height:1.2;opacity:.85}
.modal-note{padding:0 16px 16px;display:flex;gap:8px}
.modal-note input{flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.modal-note input:focus{border-color:#1e4d8c}
.search-input{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:220px}
.search-input:focus{border-color:#1e4d8c}
.table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.data-table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
.data-table thead tr{background:#f8fafc}
.data-table th{padding:11px 14px;text-align:left;font-size:12px;font-weight:600;color:#475569;border-bottom:1px solid #e2e8f0}
.data-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#374151}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:#f8fafc}
.nv-name{font-weight:500;color:#1a1a2e}
.bp-badge{display:inline-block;padding:2px 10px;background:#eff6ff;color:#1e4d8c;border-radius:20px;font-size:11px;font-weight:500}
.phep-cell{color:#059669;font-weight:500}
.empty-cell{text-align:center;color:#94a3b8;padding:32px!important}
.empty-state{text-align:center;color:#94a3b8;padding:48px 24px;background:#fff;border-radius:12px}
.num{text-align:center;font-weight:500}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px}
.form-grid .form-group{margin:0}
.form-grid .form-group:first-child{grid-column:span 2}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #e2e8f0}
.bp-list{display:flex;flex-direction:column;gap:8px}
.bp-total{font-size:13px;color:#64748b;font-weight:500}
.bp-item{background:#fff;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.06);gap:12px}
.bp-info{display:flex;align-items:center;gap:12px;flex:1}
.bp-icon{font-size:22px}
.bp-name{font-size:14px;font-weight:600;color:#1a1a2e}
.bp-count{font-size:12px;color:#64748b;margin-top:2px}
.bp-order{font-size:12px;color:#94a3b8;white-space:nowrap}
.bc-section{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px}
.bc-bp-title{padding:12px 16px;font-size:14px;font-weight:700;color:#1e4d8c;background:#eff6ff;border-bottom:1px solid #dbeafe;display:flex;align-items:center;gap:8px}
.bc-count{font-size:12px;font-weight:400;color:#64748b}
.badge-green{display:inline-block;padding:2px 10px;background:#dcfce7;color:#166534;border-radius:20px;font-size:11px;font-weight:500}
.badge-red{display:inline-block;padding:2px 10px;background:#fee2e2;color:#991b1b;border-radius:20px;font-size:11px;font-weight:500}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

function khStyle(ma){const k=KY_HIEU.find(x=>x.ma===ma);if(!k||!ma)return 'background:#f3f4f6;color:#9ca3af';return `background:${k.mau};color:${k.text}`;}
function tinhCong(ma){return({X:1,'X/2':.5,CT:1,P:1,'P/2':.5,NL:1,KL:0,'N/P':.5,TS:0,NB:0,NV:0,ĐT:1,ĐP:1,VS:1,KVS:1})[ma]??0;}

async function initApp(){
  try{
    await Promise.all([loadBoPhan(),loadNhanVien(),loadChamCong(),loadNgayLe()]);
  }catch(e){console.warn('Load error:',e);}
  hideLoading();
  render();
}

async function loadBoPhan(){const snap=await getDocs(query(collection(db,'bo_phan'),orderBy('thu_tu')));S.boPhan=snap.docs.map(d=>({id:d.id,...d.data()}));if(!S.selectedBoPhan&&S.boPhan.length>0)S.selectedBoPhan=S.boPhan[0].id;}
async function loadNhanVien(){const snap=await getDocs(collection(db,'nhan_vien'));S.nhanVien=snap.docs.map(d=>({id:d.id,...d.data()}));}
async function loadChamCong(){const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;try{const snap=await getDocs(collection(db,`cham_cong/${key}/records`));S.chamCong={};snap.docs.forEach(d=>{S.chamCong[d.id]=d.data();});}catch(e){S.chamCong={};}}
async function loadNgayLe(){const snap=await getDocs(collection(db,'ngay_le'));S.ngayLe=snap.docs.map(d=>({id:d.id,...d.data()}));}
async function saveCC(nvId,ngay,ma,ghiChu=''){const key=`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}`;const k=`${nvId}_${ngay}`;if(!ma){await deleteDoc(doc(db,`cham_cong/${key}/records`,k));delete S.chamCong[k];}else{const data={nv_id:nvId,ngay,ky_hieu:ma,ghi_chu:ghiChu,cap_nhat:new Date().toISOString()};await setDoc(doc(db,`cham_cong/${key}/records`,k),data);S.chamCong[k]=data;}}

window._login=async function(){
  const e=document.getElementById('le').value.trim();

  err.textContent='';btn.disabled=true;btn.textContent='Đang đăng nhập...';

  catch(ex){err.textContent='Email hoặc mật khẩu không đúng.';btn.disabled=false;btn.textContent='Đăng nhập';}
};

window._nav=function(p){S.page=p;render();};

// ── CHAM CONG ──
function pgChamCong(){
  const {selectedThang:th,selectedNam:nam,selectedBoPhan:sbp}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===sbp);
  const thOpts=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m===th?'selected':''}>${String(m).padStart(2,'0')}/${nam}</option>`).join('');
  const bpTabs=S.boPhan.map(b=>`<button class="bp-tab ${sbp===b.id?'active':''}" onclick="window._selBP('${b.id}')">${b.ten_bo_phan}</button>`).join('');
  const dayHdrs=days.map(d=>{const dw=new Date(nam,th-1,d).getDay();const isWE=dw===0||dw===6;const isHL=S.ngayLe.some(l=>l.ngay===`${nam}-${String(th).padStart(2,'0')}-${String(d).padStart(2,'0')}`);const lbl=['CN','T2','T3','T4','T5','T6','T7'][dw];return`<th class="day-header ${isWE?'weekend':''} ${isHL?'holiday':''}" title="${lbl}">${d}</th>`;}).join('');
  const rows=nvs.map(nv=>{
    let tong=0,phep=0,vang=0,vp=0;
    const cells=days.map(d=>{const k=`${nv.id}_${d}`;const cc=S.chamCong[k];const ma=cc?.ky_hieu||'';tong+=tinhCong(ma);phep+=tinhPhep(ma);if(ma==='KL')vang++;if(['ĐT','ĐP','VS','KVS'].includes(ma))vp++;return`<td class="cc-cell" onclick="window._openCell('${nv.id}',${d})" title="${cc?.ghi_chu||''}"><span class="cc-badge" style="${khStyle(ma)}">${ma||'·'}</span></td>`;}).join('');
    return`<tr><td class="nv-name-cell">${nv.ten}</td>${cells}<td class="sum-cell">${tong}</td><td class="sum-cell phep">${phep}</td><td class="sum-cell vang">${vang}</td><td class="sum-cell vipham">${vp}</td></tr>`;
  }).join('');
  return`<div class="cc-wrap">
    <div class="cc-toolbar">
      <div class="bp-tabs">${bpTabs||'<span style="color:#94a3b8;font-size:13px">Chưa có bộ phận — hãy thêm bộ phận trước</span>'}</div>
      <div class="cc-controls">
        <select class="sel-thang" onchange="window._selThang(this.value)">${thOpts}</select>
        <button class="btn-icon" onclick="window._fillMonth()">✨ Điền X tháng</button>
      </div>
    </div>
    ${nvs.length===0?'<div class="empty-state">Bộ phận này chưa có nhân viên</div>':`
    <div class="cc-table-wrap"><table class="cc-table">
      <thead><tr><th class="nv-header">Nhân viên</th>${dayHdrs}<th class="sum-header">Công</th><th class="sum-header" style="color:#f59e0b">Phép</th><th class="sum-header" style="color:#ef4444">KL</th><th class="sum-header" style="color:#f97316">VP</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`}
  </div>
  <div class="modal-overlay" id="cell-modal" style="display:none" onclick="if(event.target.id==='cell-modal')window._closeCellF()">
    <div class="modal-box">
      <div class="modal-header"><span id="modal-title">Chọn ký hiệu</span><button class="modal-close" onclick="window._closeCellF()">✕</button></div>
      <div class="ky-hieu-grid">${KY_HIEU.map(k=>`<button class="kh-btn" style="background:${k.mau};color:${k.text}" onclick="window._pickKH('${k.ma}')"><span class="kh-ma">${k.label}</span><span class="kh-ten">${k.ten}</span></button>`).join('')}</div>
      <div class="modal-note"><input type="text" id="modal-note" placeholder="Ghi chú (tuỳ chọn)..."/></div>
    </div>
  </div>`;
}

let _cNv,_cNg;
window._openCell=function(nv,ng){_cNv=nv;_cNg=ng;const n=S.nhanVien.find(x=>x.id===nv);document.getElementById('modal-title').textContent=`${n?.ten||''} — Ngày ${ng}`;document.getElementById('modal-note').value=S.chamCong[`${nv}_${ng}`]?.ghi_chu||'';document.getElementById('cell-modal').style.display='flex';};
window._closeCellF=function(){document.getElementById('cell-modal').style.display='none';};
window._pickKH=async function(ma){const note=document.getElementById('modal-note').value;window._closeCellF();await saveCC(_cNv,_cNg,ma,note);showToast(ma?'Đã lưu ký hiệu ✓':'Đã xóa ký hiệu');rePb();};
window._fillMonth=async function(){
  const nvs=S.nhanVien.filter(n=>n.bo_phan_id===S.selectedBoPhan);
  if(!nvs.length)return;
  if(!confirm(`Điền X cho ${nvs.length} nhân viên — các ngày thường chưa có ký hiệu?`))return;
  const dim=new Date(S.selectedNam,S.selectedThang,0).getDate();
  document.getElementById('pb').innerHTML='<div class="empty-state">Đang điền dữ liệu...</div>';
  for(const nv of nvs){
    for(let d=1;d<=dim;d++){
      const k=`${nv.id}_${d}`;if(S.chamCong[k])continue;
      const dw=new Date(S.selectedNam,S.selectedThang-1,d).getDay();
      const isHL=S.ngayLe.some(l=>l.ngay===`${S.selectedNam}-${String(S.selectedThang).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
      const isWE=dw===0||dw===6;
      await saveCC(nv.id,d,isHL?'NL':isWE?'KL':'X');
    }
  }
  showToast('Đã điền xong ✓');rePb();
};

// ── NHAN VIEN ──
function pgNhanVien(){
  const bpOpts=`<option value="">Tất cả bộ phận</option>`+S.boPhan.map(b=>`<option value="${b.id}" ${S._nvBpFilter===b.id?'selected':''}>${b.ten_bo_phan}</option>`).join('');
  const nvs=S.nhanVien.filter(n=>{const mb=!S._nvBpFilter||n.bo_phan_id===S._nvBpFilter;const ms=!S._nvSearch||n.ten.toLowerCase().includes(S._nvSearch.toLowerCase())||(n.ma_nv||'').toLowerCase().includes(S._nvSearch.toLowerCase());return mb&&ms;});
  const rows=nvs.map(nv=>{const bp=S.boPhan.find(b=>b.id===nv.bo_phan_id);return`<tr><td>${nv.ma_nv||'—'}</td><td class="nv-name">${nv.ten}</td><td><span class="bp-badge">${bp?.ten_bo_phan||'—'}</span></td><td>${nv.chuc_vu||'—'}</td><td>${nv.ngay_vao||'—'}</td><td class="phep-cell">${nv.phep_con??'—'}/${nv.phep_nam||12}</td><td><div class="action-btns"><button class="btn-edit" onclick="window._editNV('${nv.id}')">Sửa</button><button class="btn-del" onclick="window._delNV('${nv.id}')">Xóa</button></div></td></tr>`;}).join('');
  const ed=S._editNV||{};const isNew=!ed.id;
  const bpSel=S.boPhan.map(b=>`<option value="${b.id}" ${ed.bo_phan_id===b.id?'selected':''}>${b.ten_bo_phan}</option>`).join('');
  return`<div class="nv-wrap">
    <div class="nv-toolbar">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input class="search-input" type="text" placeholder="🔍 Tìm tên, mã NV..." value="${S._nvSearch}" oninput="window._searchNV(this.value)"/>
        <select class="sel-bp" onchange="window._filterBP(this.value)">${bpOpts}</select>
      </div>
      <button class="btn-primary" onclick="window._addNV()">+ Thêm nhân viên</button>
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Mã NV</th><th>Họ tên</th><th>Bộ phận</th><th>Chức vụ</th><th>Ngày vào</th><th>Phép còn</th><th>Thao tác</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" class="empty-cell">Không có nhân viên nào</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="modal-overlay" id="nv-modal" style="display:${S._showNVM?'flex':'none'}" onclick="if(event.target.id==='nv-modal')window._closeNVF()">
    <div class="modal-box modal-form">
      <div class="modal-header"><span>${isNew?'Thêm nhân viên':'Sửa nhân viên'}</span><button class="modal-close" onclick="window._closeNVF()">✕</button></div>
      <div class="form-grid">
        <div class="form-group"><label>Họ tên *</label><input id="nv-ten" value="${ed.ten||''}" placeholder="Nguyễn Văn A"/></div>
        <div class="form-group"><label>Mã NV</label><input id="nv-ma" value="${ed.ma_nv||''}" placeholder="NV001"/></div>
        <div class="form-group"><label>Bộ phận *</label><select id="nv-bp"><option value="">-- Chọn --</option>${bpSel}</select></div>
        <div class="form-group"><label>Chức vụ</label><input id="nv-cv" value="${ed.chuc_vu||''}" placeholder="Nhân viên"/></div>
        <div class="form-group"><label>Ngày vào làm</label><input type="date" id="nv-ngay" value="${ed.ngay_vao||''}"/></div>
        <div class="form-group"><label>Phép/năm</label><input type="number" id="nv-pn" value="${ed.phep_nam||12}" min="0" max="30"/></div>
        <div class="form-group"><label>Phép còn lại</label><input type="number" id="nv-pc" value="${ed.phep_con??12}" min="0" max="30"/></div>
      </div>
      <div class="modal-actions"><button class="btn-secondary" onclick="window._closeNVF()">Huỷ</button><button class="btn-primary" onclick="window._saveNV()">Lưu</button></div>
    </div>
  </div>`;
}
window._addNV=function(){S._editNV={};S._showNVM=true;rePb();};
window._editNV=function(id){S._editNV={...S.nhanVien.find(n=>n.id===id)};S._showNVM=true;rePb();};
window._closeNVF=function(){S._showNVM=false;S._editNV=null;rePb();};
window._delNV=async function(id){if(!confirm('Xóa nhân viên này?'))return;await deleteDoc(doc(db,'nhan_vien',id));S.nhanVien=S.nhanVien.filter(n=>n.id!==id);showToast('Đã xóa nhân viên');rePb();};
window._saveNV=async function(){
  const ten=document.getElementById('nv-ten').value.trim();
  const bp=document.getElementById('nv-bp').value;
  if(!ten||!bp){alert('Vui lòng điền họ tên và chọn bộ phận!');return;}
  const data={ten,bo_phan_id:bp,ma_nv:document.getElementById('nv-ma').value.trim(),chuc_vu:document.getElementById('nv-cv').value.trim(),ngay_vao:document.getElementById('nv-ngay').value,phep_nam:parseInt(document.getElementById('nv-pn').value)||12,phep_con:parseInt(document.getElementById('nv-pc').value)||12};
  if(S._editNV?.id){await updateDoc(doc(db,'nhan_vien',S._editNV.id),data);S.nhanVien=S.nhanVien.map(n=>n.id===S._editNV.id?{...n,...data}:n);}
  else{const r=await addDoc(collection(db,'nhan_vien'),data);S.nhanVien.push({id:r.id,...data});}
  S._showNVM=false;S._editNV=null;showToast('Đã lưu nhân viên ✓');rePb();
};

// ── BO PHAN ──
function pgBoPhan(){
  const items=S.boPhan.map((bp,i)=>{const cnt=S.nhanVien.filter(n=>n.bo_phan_id===bp.id).length;return`<div class="bp-item"><div class="bp-info"><div class="bp-icon">🏢</div><div><div class="bp-name">${bp.ten_bo_phan}</div><div class="bp-count">${cnt} nhân viên</div></div></div><div class="bp-order">Thứ tự: ${bp.thu_tu||i+1}</div><div class="action-btns"><button class="btn-edit" onclick="window._editBP('${bp.id}')">Sửa</button><button class="btn-del" onclick="window._delBP('${bp.id}')">Xóa</button></div></div>`;}).join('');
  const ed=S._editBP||{};
  return`<div class="bp-wrap">
    <div class="bp-toolbar">
      <div class="bp-total">${S.boPhan.length} bộ phận · ${S.nhanVien.length} nhân viên</div>
      <button class="btn-primary" onclick="window._addBP()">+ Thêm bộ phận</button>
    </div>
    <div class="bp-list">${items||'<div class="empty-state">Chưa có bộ phận nào</div>'}</div>
  </div>
  <div class="modal-overlay" id="bp-modal" style="display:${S._showBPM?'flex':'none'}" onclick="if(event.target.id==='bp-modal')window._closeBPF()">
    <div class="modal-box modal-form" style="max-width:400px">
      <div class="modal-header"><span>${ed.id?'Sửa bộ phận':'Thêm bộ phận'}</span><button class="modal-close" onclick="window._closeBPF()">✕</button></div>
      <div style="padding:16px 20px;display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label>Tên bộ phận *</label><input id="bp-ten" value="${ed.ten_bo_phan||''}" placeholder="VD: Kế toán"/></div>
        <div class="form-group"><label>Thứ tự hiển thị</label><input type="number" id="bp-tt" value="${ed.thu_tu||S.boPhan.length+1}" min="1"/></div>
      </div>
      <div class="modal-actions"><button class="btn-secondary" onclick="window._closeBPF()">Huỷ</button><button class="btn-primary" onclick="window._saveBP()">Lưu</button></div>
    </div>
  </div>`;
}
window._addBP=function(){S._editBP={};S._showBPM=true;rePb();};
window._editBP=function(id){S._editBP={...S.boPhan.find(b=>b.id===id)};S._showBPM=true;rePb();};
window._closeBPF=function(){S._showBPM=false;S._editBP=null;rePb();};
window._delBP=async function(id){const cnt=S.nhanVien.filter(n=>n.bo_phan_id===id).length;if(cnt>0){alert(`Không thể xóa! Còn ${cnt} nhân viên trong bộ phận.`);return;}if(!confirm('Xóa bộ phận này?'))return;await deleteDoc(doc(db,'bo_phan',id));S.boPhan=S.boPhan.filter(b=>b.id!==id);if(S.selectedBoPhan===id)S.selectedBoPhan=S.boPhan[0]?.id||null;showToast('Đã xóa bộ phận');rePb();};
window._saveBP=async function(){const ten=document.getElementById('bp-ten').value.trim();if(!ten){alert('Vui lòng nhập tên bộ phận!');return;}const data={ten_bo_phan:ten,thu_tu:parseInt(document.getElementById('bp-tt').value)||1};if(S._editBP?.id){await updateDoc(doc(db,'bo_phan',S._editBP.id),data);S.boPhan=S.boPhan.map(b=>b.id===S._editBP.id?{...b,...data}:b);}else{const r=await addDoc(collection(db,'bo_phan'),data);S.boPhan.push({id:r.id,...data});S.boPhan.sort((a,b)=>(a.thu_tu||0)-(b.thu_tu||0));}S._showBPM=false;S._editBP=null;showToast('Đã lưu bộ phận ✓');rePb();};

// ── NGAY LE ──
function pgNgayLe(){
  const nam=S.selectedNam;
  const items=S.ngayLe.filter(l=>l.ngay?.startsWith(String(nam))).sort((a,b)=>a.ngay.localeCompare(b.ngay));
  const rows=items.map(nl=>`<tr><td>${nl.ngay}</td><td>${nl.ten}</td><td><span class="${nl.co_luong?'badge-green':'badge-red'}">${nl.co_luong?'Có lương':'Không lương'}</span></td><td><div class="action-btns"><button class="btn-edit" onclick="window._editNL('${nl.id}')">Sửa</button><button class="btn-del" onclick="window._delNL('${nl.id}')">Xóa</button></div></td></tr>`).join('');
  const ed=S._editNL||{};
  return`<div class="nl-wrap">
    <div class="nl-toolbar">
      <div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:#64748b">Năm:</span>
        <select class="sel-nam" onchange="window._selNam(this.value)">${[2024,2025,2026,2027].map(y=>`<option value="${y}" ${y===nam?'selected':''}>${y}</option>`).join('')}</select>
      </div>
      <button class="btn-primary" onclick="window._addNL()">+ Thêm ngày lễ</button>
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Ngày</th><th>Tên ngày lễ</th><th>Chế độ lương</th><th>Thao tác</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4" class="empty-cell">Chưa có ngày lễ nào</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="modal-overlay" id="nl-modal" style="display:${S._showNLM?'flex':'none'}" onclick="if(event.target.id==='nl-modal')window._closeNLF()">
    <div class="modal-box modal-form" style="max-width:420px">
      <div class="modal-header"><span>${ed.id?'Sửa ngày lễ':'Thêm ngày lễ'}</span><button class="modal-close" onclick="window._closeNLF()">✕</button></div>
      <div style="padding:16px 20px;display:flex;flex-direction:column;gap:12px">
        <div class="form-group"><label>Ngày *</label><input type="date" id="nl-ngay" value="${ed.ngay||''}"/></div>
        <div class="form-group"><label>Tên ngày lễ *</label><input id="nl-ten" value="${ed.ten||''}" placeholder="VD: Tết Nguyên Đán"/></div>
        <div class="form-group"><label>Chế độ lương</label><select id="nl-luong"><option value="true" ${ed.co_luong!==false?'selected':''}>Có lương</option><option value="false" ${ed.co_luong===false?'selected':''}>Không lương</option></select></div>
      </div>
      <div class="modal-actions"><button class="btn-secondary" onclick="window._closeNLF()">Huỷ</button><button class="btn-primary" onclick="window._saveNL()">Lưu</button></div>
    </div>
  </div>`;
}
window._addNL=function(){S._editNL={};S._showNLM=true;rePb();};
window._editNL=function(id){S._editNL={...S.ngayLe.find(n=>n.id===id)};S._showNLM=true;rePb();};
window._closeNLF=function(){S._showNLM=false;S._editNL=null;rePb();};
window._delNL=async function(id){if(!confirm('Xóa ngày lễ này?'))return;await deleteDoc(doc(db,'ngay_le',id));S.ngayLe=S.ngayLe.filter(n=>n.id!==id);showToast('Đã xóa');rePb();};
window._saveNL=async function(){const ng=document.getElementById('nl-ngay').value;const ten=document.getElementById('nl-ten').value.trim();if(!ng||!ten){alert('Vui lòng điền đủ thông tin!');return;}const data={ngay:ng,ten,co_luong:document.getElementById('nl-luong').value==='true'};if(S._editNL?.id){await updateDoc(doc(db,'ngay_le',S._editNL.id),data);S.ngayLe=S.ngayLe.map(n=>n.id===S._editNL.id?{...n,...data}:n);}else{const r=await addDoc(collection(db,'ngay_le'),data);S.ngayLe.push({id:r.id,...data});}S._showNLM=false;S._editNL=null;showToast('Đã lưu ✓');rePb();};

// ── BAO CAO ──
function pgBaoCao(){
  const {selectedThang:th,selectedNam:nam}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  const tables=S.boPhan.map(bp=>{
    const nvs=S.nhanVien.filter(n=>n.bo_phan_id===bp.id);
    if(!nvs.length)return'';
    const rows=nvs.map(nv=>{let tong=0,phep=0,nl=0,kl=0,dt=0,vp=0;days.forEach(d=>{const ma=S.chamCong[`${nv.id}_${d}`]?.ky_hieu||'';tong+=tinhCong(ma);phep+=tinhPhep(ma);if(ma==='NL')nl++;if(ma==='KL')kl++;if(ma==='ĐT'||ma==='VS')dt++;if(['ĐP','KVS'].includes(ma))vp++;});return`<tr><td>${nv.ten}</td><td class="num">${tong}</td><td class="num" style="color:#f59e0b">${phep}</td><td class="num" style="color:#a78bfa">${nl}</td><td class="num" style="color:#ef4444">${kl}</td><td class="num" style="color:#f97316">${dt}</td><td class="num" style="color:#d946ef">${vp}</td></tr>`;}).join('');
    return`<div class="bc-section"><div class="bc-bp-title">${bp.ten_bo_phan}<span class="bc-count">${nvs.length} người</span></div><table class="data-table"><thead><tr><th>Nhân viên</th><th>Công</th><th style="color:#f59e0b">Phép</th><th style="color:#a78bfa">Lễ</th><th style="color:#ef4444">KL</th><th style="color:#f97316">Trễ/Sớm</th><th style="color:#d946ef">VP khác</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');
  const thOpts=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}" ${m===th?'selected':''}>Tháng ${m}/${nam}</option>`).join('');
  return`<div class="bc-wrap">
    <div class="bc-toolbar">
      <select class="sel-thang" onchange="window._selThang(this.value)">${thOpts}</select>
      <button class="btn-export" onclick="window._exportCSV()">📥 Xuất Excel (CSV)</button>
    </div>
    ${tables||'<div class="empty-state">Chưa có dữ liệu chấm công</div>'}
  </div>`;
}

window._exportCSV=function(){
  const {selectedThang:th,selectedNam:nam}=S;
  const dim=new Date(nam,th,0).getDate();
  const days=[...Array(dim).keys()].map(i=>i+1);
  let csv='\uFEFF';
  csv+=`Báo cáo chấm công Tháng ${th}/${nam}\n`;
  csv+=`Bộ phận,Nhân viên,${days.join(',')},Tổng công,Phép,KL,Trễ/Sớm\n`;
  S.boPhan.forEach(bp=>{S.nhanVien.filter(n=>n.bo_phan_id===bp.id).forEach(nv=>{let tong=0,phep=0,kl=0,dt=0;const cells=days.map(d=>{const ma=S.chamCong[`${nv.id}_${d}`]?.ky_hieu||'';tong+=tinhCong(ma);phep+=tinhPhep(ma);if(ma==='KL')kl++;if(['ĐT','VS'].includes(ma))dt++;return ma||'';});csv+=`${bp.ten_bo_phan},${nv.ten},${cells.join(',')},${tong},${phep},${kl},${dt}\n`;});});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`cham_cong_T${th}_${nam}.csv`;a.click();URL.revokeObjectURL(url);
  showToast('Đã xuất file CSV ✓');
};
</script>
</body>
